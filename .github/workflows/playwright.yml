name: Run Salesforce SOQL Query

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-soql:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: '24'

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to Salesforce Org
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" | sf org login sfdx-url --sfdx-url-stdin --set-default

      - name: Execute SOQL Query
        run: |
          sf data query --query "SELECT Id, Name, Industry FROM Account LIMIT 10" --result-format csv
